<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TapSwap Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@500;900&display=swap');

        :root {
            --tg-theme-bg-color: #000000;
            --primary-gold: #ffcf00;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* Coin ve Tıklama Alanı */
        .coin-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .coin-btn {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border: 6px solid #222;
            box-shadow: 0 0 40px rgba(255, 207, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.05s;
            overflow: hidden;
        }

        .coin-btn:active {
            transform: scale(0.94);
        }

        .coin-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* Yüzen Sayılar */
        .tap-marker {
            position: absolute;
            color: white;
            font-weight: 900;
            font-size: 2.2rem;
            pointer-events: none;
            animation: tap-float 0.7s ease-out forwards;
            z-index: 100;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        @keyframes tap-float {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-160px) scale(1.3); opacity: 0; }
        }

        /* Sekme Sistemi */
        .page {
            display: none;
            height: 100%;
            width: 100%;
            animation: fadeIn 0.2s ease-out;
        }

        .page.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Alt Navigasyon */
        .nav-active {
            color: var(--primary-gold) !important;
        }

        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="h-screen flex flex-col items-center">

    <!-- Üst Skor Tablosu -->
    <header class="w-full max-w-md px-6 pt-12 flex flex-col items-center z-50">
        <div class="flex items-center gap-2 bg-zinc-900/60 border border-white/5 px-4 py-1 rounded-full mb-8">
            <i data-lucide="award" class="w-4 h-4 text-yellow-500"></i>
            <span id="rank-name" class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Bronz Ligi</span>
            <i data-lucide="chevron-right" class="w-3 h-3 text-zinc-600"></i>
        </div>

        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-yellow-500 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(234,179,8,0.3)]">
                <span class="text-2xl font-black text-black">$</span>
            </div>
            <span id="balance" class="text-5xl font-black orbitron tracking-tighter">0</span>
        </div>
    </header>

    <!-- Ana Oyun Alanı -->
    <main class="flex-1 w-full max-w-md relative flex flex-col overflow-hidden">
        
        <!-- TIKLA SAYFASI -->
        <section id="page-tap" class="page active items-center justify-center">
            <div class="coin-wrapper">
                <div id="tap-trigger" class="coin-btn">
                    <!-- Doğrudan Resim Bağlantısı (Direct Link) -->
                    <img src="https://i.ibb.co/nRL9mPb/tap-swap.png" alt="TapSwap Logo" onerror="this.src='https://via.placeholder.com/280?text=TapSwap+Logo'">
                </div>
            </div>
            <div class="mt-12 text-zinc-600 font-black uppercase tracking-[0.2em] text-xs animate-pulse">Tap to earn</div>
        </section>

        <!-- MARKET SAYFASI (Coin ve Tıklama Yazısı Yok) -->
        <section id="page-market" class="page px-6 pt-8 overflow-y-auto custom-scroll">
            <h2 class="text-3xl font-black mb-1">Market</h2>
            <p class="text-zinc-500 text-sm mb-8">Geliştirmelerle daha hızlı kazan.</p>
            
            <div id="shop-items" class="space-y-4 pb-32">
                <!-- Market öğeleri dinamik yüklenir -->
            </div>
        </section>

        <!-- GÖREVLER SAYFASI (Coin ve Tıklama Yazısı Yok) -->
        <section id="page-tasks" class="page px-6 pt-8 overflow-y-auto custom-scroll">
            <h2 class="text-3xl font-black mb-1">Görevler</h2>
            <p class="text-zinc-500 text-sm mb-8">Ödülleri toplamak için görevleri bitir.</p>
            
            <div class="space-y-3 pb-32">
                <div class="bg-zinc-900/50 border border-zinc-800 p-5 rounded-3xl flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center">
                            <i data-lucide="send" class="w-6 h-6 text-blue-400"></i>
                        </div>
                        <div>
                            <p class="font-bold text-lg">Telegram</p>
                            <p class="text-yellow-500 font-bold text-sm">+100.000 $</p>
                        </div>
                    </div>
                    <button class="bg-white text-black font-black px-5 py-2 rounded-xl text-xs">KATIL</button>
                </div>
            </div>
        </section>

    </main>

    <!-- Alt Navigasyon ve Enerji -->
    <footer class="w-full max-w-md px-6 pb-10 z-50">
        <!-- Enerji Paneli -->
        <div class="mb-6">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-2">
                    <i data-lucide="zap" class="w-6 h-6 text-yellow-400 fill-current"></i>
                    <span id="current-energy" class="text-2xl font-black orbitron">1000</span>
                    <span class="text-zinc-600 text-sm font-bold">/ <span id="max-energy">1000</span></span>
                </div>
                <div class="text-[10px] font-black uppercase text-zinc-600 tracking-widest">Enerji</div>
            </div>
            <div class="w-full h-3.5 bg-zinc-900 rounded-full border border-zinc-800 p-0.5">
                <div id="energy-bar" class="h-full bg-gradient-to-r from-yellow-600 to-yellow-300 rounded-full transition-all duration-300" style="width: 100%"></div>
            </div>
        </div>

        <!-- Navigasyon -->
        <nav class="grid grid-cols-3 bg-zinc-900/90 backdrop-blur-2xl border border-white/5 p-1.5 rounded-[2rem] shadow-2xl">
            <button onclick="navigate('tap')" id="nav-tap" class="flex flex-col items-center gap-1 py-3 text-zinc-500 nav-active">
                <i data-lucide="mouse-pointer-click" class="w-6 h-6"></i>
                <span class="text-[10px] font-black uppercase">Tıkla</span>
            </button>
            <button onclick="navigate('market')" id="nav-market" class="flex flex-col items-center gap-1 py-3 text-zinc-500">
                <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                <span class="text-[10px] font-black uppercase">Market</span>
            </button>
            <button onclick="navigate('tasks')" id="nav-tasks" class="flex flex-col items-center gap-1 py-3 text-zinc-500">
                <i data-lucide="layout-list" class="w-6 h-6"></i>
                <span class="text-[10px] font-black uppercase">Görevler</span>
            </button>
        </nav>
    </footer>

    <script>
        let game = {
            balance: 0,
            energy: 1000,
            maxEnergy: 1000,
            tapPower: 1,
            recharge: 1.2,
            levels: { tap: 1, limit: 1, speed: 1 }
        };

        const elements = {
            balance: document.getElementById('balance'),
            energy: document.getElementById('current-energy'),
            maxEnergy: document.getElementById('max-energy'),
            energyBar: document.getElementById('energy-bar'),
            rank: document.getElementById('rank-name'),
            tapBtn: document.getElementById('tap-trigger'),
            shop: document.getElementById('shop-items')
        };

        lucide.createIcons();

        function updateUI() {
            elements.balance.innerText = Math.floor(game.balance).toLocaleString();
            elements.energy.innerText = Math.floor(game.energy);
            elements.maxEnergy.innerText = game.maxEnergy;
            elements.energyBar.style.width = `${(game.energy / game.maxEnergy) * 100}%`;
            
            if (game.balance < 50000) elements.rank.innerText = "Bronz Ligi";
            else if (game.balance < 500000) elements.rank.innerText = "Gümüş Ligi";
            else elements.rank.innerText = "Altın Ligi";

            renderShop();
        }

        elements.tapBtn.addEventListener('click', (e) => {
            if (game.energy < 1) return;
            game.balance += game.tapPower;
            game.energy -= 1;

            const x = e.clientX || (window.innerWidth / 2);
            const y = e.clientY || (window.innerHeight / 2);
            createEffect(x, y);
            updateUI();
        });

        function createEffect(x, y) {
            const div = document.createElement('div');
            div.className = 'tap-marker orbitron';
            div.innerText = `+${game.tapPower}`;
            div.style.left = `${x - 20}px`;
            div.style.top = `${y - 60}px`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 700);
        }

        function navigate(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${id}`).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('nav-active');
                if(b.id === `nav-${id}`) b.classList.add('nav-active');
            });
        }

        const upgrades = [
            { id: 'tap', name: 'Tıklama Gücü', icon: 'zap', color: 'yellow', base: 200 },
            { id: 'limit', name: 'Enerji Limiti', icon: 'battery', color: 'green', base: 400 },
            { id: 'speed', name: 'Dolum Hızı', icon: 'refresh-cw', color: 'blue', base: 1000 }
        ];

        function getCost(id) {
            return Math.floor(upgrades.find(u => u.id === id).base * Math.pow(1.8, game.levels[id] - 1));
        }

        function buy(id) {
            const cost = getCost(id);
            if (game.balance >= cost) {
                game.balance -= cost;
                game.levels[id]++;
                if (id === 'tap') game.tapPower++;
                if (id === 'limit') game.maxEnergy += 500;
                if (id === 'speed') game.recharge += 0.5;
                updateUI();
            }
        }

        function renderShop() {
            elements.shop.innerHTML = upgrades.map(u => {
                const cost = getCost(u.id);
                const can = game.balance >= cost;
                return `
                    <div onclick="buy('${u.id}')" class="bg-zinc-900/60 border border-zinc-800 p-5 rounded-[2rem] flex items-center justify-between active:scale-95 transition-transform">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-${u.color}-500/10 rounded-2xl flex items-center justify-center text-${u.color}-400">
                                <i data-lucide="${u.icon}"></i>
                            </div>
                            <div>
                                <h3 class="font-bold">${u.name}</h3>
                                <p class="text-[10px] text-zinc-600 font-black uppercase">Lvl ${game.levels[u.id]}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="font-black orbitron ${can ? 'text-white' : 'text-red-500'}">${cost.toLocaleString()}</span>
                            <span class="text-yellow-500 font-bold">$</span>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        setInterval(() => {
            if (game.energy < game.maxEnergy) {
                game.energy = Math.min(game.maxEnergy, game.energy + (game.recharge / 10));
                updateUI();
            }
        }, 100);

        updateUI();
    </script>
</body>
</html>
